<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PixelFlow - Level 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <aside id="debugPanel" class="debug-panel" aria-label="Debug panel">
      <div class="debug-title">ОТЛАДКА</div>
      <div class="debug-actions">
        <button id="debug6" type="button" aria-label="Мгновенная победа">победа</button>
        <button id="debugReset" type="button" aria-label="Сбросить настройки отладки">сброс</button>
      </div>

      <div class="debug-section">
        <div class="debug-section-title">Геймплей</div>
        <label class="debug-control" for="shotBounceSize">
          <span>Отдача: сила</span>
          <input id="shotBounceSize" type="range" min="0.05" max="0.7" step="0.01" value="0.32">
          <output id="shotBounceSizeValue" for="shotBounceSize">0.32</output>
        </label>
        <label class="debug-control" for="shotBounceSpeed">
          <span>Отдача: скорость</span>
          <input id="shotBounceSpeed" type="range" min="0.4" max="2.6" step="0.05" value="1">
          <output id="shotBounceSpeedValue" for="shotBounceSpeed">1.00x</output>
        </label>
        <label class="debug-control" for="railSpeed">
          <span>Скорость рельс</span>
          <input id="railSpeed" type="range" min="420" max="1400" step="10" value="980">
          <output id="railSpeedValue" for="railSpeed">980</output>
        </label>
        <label class="debug-control" for="queueCards">
          <span>Карточек в очереди</span>
          <input id="queueCards" type="range" min="2" max="24" step="1" value="7">
          <output id="queueCardsValue" for="queueCards">7</output>
        </label>
      </div>

      <div class="debug-section">
        <div class="debug-section-title">Верхний UI</div>
        <label class="debug-control" for="topPanelFontSize">
          <span>Шрифт верхнего UI</span>
          <input id="topPanelFontSize" type="range" min="24" max="80" step="1" value="67">
          <output id="topPanelFontSizeValue" for="topPanelFontSize">67</output>
        </label>
        <label class="debug-control" for="levelPanelScale">
          <span>Размер плашки Level</span>
          <input id="levelPanelScale" type="range" min="0.60" max="1.80" step="0.01" value="1.07">
          <output id="levelPanelScaleValue" for="levelPanelScale">1.07x</output>
        </label>
        <label class="debug-control" for="coinsPanelScale">
          <span>Размер правой плашки</span>
          <input id="coinsPanelScale" type="range" min="0.60" max="1.80" step="0.01" value="0.80">
          <output id="coinsPanelScaleValue" for="coinsPanelScale">0.80x</output>
        </label>
        <label class="debug-control" for="backButtonScale">
          <span>Размер левой кнопки</span>
          <input id="backButtonScale" type="range" min="0.60" max="1.80" step="0.01" value="1.02">
          <output id="backButtonScaleValue" for="backButtonScale">1.02x</output>
        </label>
        <label class="debug-control" for="topUiYOffset">
          <span>Сдвиг верхнего UI по Y</span>
          <input id="topUiYOffset" type="range" min="-60" max="220" step="1" value="65">
          <output id="topUiYOffsetValue" for="topUiYOffset">65</output>
        </label>
      </div>

      <div class="debug-section">
        <div class="debug-section-title">Центр и рельсы</div>
        <label class="debug-control" for="trackYOffset">
          <span>Сдвиг рельс по Y</span>
          <input id="trackYOffset" type="range" min="-220" max="260" step="1" value="18">
          <output id="trackYOffsetValue" for="trackYOffset">18</output>
        </label>
        <label class="debug-control" for="playfieldScale">
          <span>Размер центра + рельс</span>
          <input id="playfieldScale" type="range" min="0.70" max="1.50" step="0.01" value="0.86">
          <output id="playfieldScaleValue" for="playfieldScale">0.86x</output>
        </label>
        <label class="debug-control" for="fieldScale">
          <span>Доп. размер центра</span>
          <input id="fieldScale" type="range" min="0.65" max="1.50" step="0.01" value="1.07">
          <output id="fieldScaleValue" for="fieldScale">1.07x</output>
        </label>
      </div>

      <div class="debug-section">
        <div class="debug-section-title">Нижние ячейки и блоки</div>
        <label class="debug-control" for="slotSizeScale">
          <span>Размер нижних ячеек</span>
          <input id="slotSizeScale" type="range" min="0.60" max="1.70" step="0.01" value="1.00">
          <output id="slotSizeScaleValue" for="slotSizeScale">1.00x</output>
        </label>
        <label class="debug-control" for="slotYOffset">
          <span>Сдвиг ячеек по Y</span>
          <input id="slotYOffset" type="range" min="-220" max="260" step="1" value="-63">
          <output id="slotYOffsetValue" for="slotYOffset">-63</output>
        </label>
        <label class="debug-control" for="cardAllYOffset">
          <span>Все нижние блоки по Y</span>
          <input id="cardAllYOffset" type="range" min="-260" max="260" step="1" value="-72">
          <output id="cardAllYOffsetValue" for="cardAllYOffset">-72</output>
        </label>
        <label class="debug-control" for="card1YOffset">
          <span>Блок 1 по Y</span>
          <input id="card1YOffset" type="range" min="-260" max="260" step="1" value="60">
          <output id="card1YOffsetValue" for="card1YOffset">60</output>
        </label>
        <label class="debug-control" for="card2YOffset">
          <span>Блок 2 по Y</span>
          <input id="card2YOffset" type="range" min="-260" max="260" step="1" value="7">
          <output id="card2YOffsetValue" for="card2YOffset">7</output>
        </label>
        <label class="debug-control" for="card3YOffset">
          <span>Блок 3 по Y</span>
          <input id="card3YOffset" type="range" min="-260" max="260" step="1" value="0">
          <output id="card3YOffsetValue" for="card3YOffset">0</output>
        </label>
        <label class="debug-control" for="card4YOffset">
          <span>Блок 4 по Y</span>
          <input id="card4YOffset" type="range" min="-260" max="260" step="1" value="0">
          <output id="card4YOffsetValue" for="card4YOffset">0</output>
        </label>
      </div>
    </aside>
    <canvas id="gameCanvas" aria-label="PixelFlow mini puzzle game"></canvas>
  </main>
  <script src="main.js"></script>
</body>
</html>
